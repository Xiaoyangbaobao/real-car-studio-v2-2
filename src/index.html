<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Car Studio</title>
  </head>
  <body>
    <div class="loading-overlay" data-loading-overlay>
      <div class="loading-inner">
        <div class="eyebrow">REAL CAR STUDIO</div>
        <h1>Crafted in Light and Motion</h1>
        <p data-loading-text>Preparing scene…</p>
      </div>
    </div>

    <div class="hud">
      <div class="brand">
        <div class="eyebrow">AUTOMOTIVE EXPERIENCE</div>
        <h2>Real Car Studio</h2>
        <p>Cinematic reveal, premium lighting, and environment switching.</p>
      </div>

      <div class="panel">
        <section>
          <h3>Environment</h3>
          <div class="button-grid">
            <button data-env="desert">Desert</button>
            <button data-env="beach">Beach</button>
            <button data-env="snow">Snow</button>
          </div>
        </section>

        <section>
          <h3>Views</h3>
          <div class="button-grid">
            <button data-view="hero">Hero</button>
            <button data-view="front">Front</button>
            <button data-view="side">Side</button>
            <button data-view="rear">Rear</button>
          </div>
        </section>
        <section class="group">
          <h3>Paint</h3>
          <div class="button-grid">
            <button data-paint="gloss-black">Gloss Black</button>
            <button data-paint="pearl-white">Pearl White</button>
            <button data-paint="racing-red">Racing Red</button>
            <button data-paint="matte-gray">Matte Gray</button>
            <button data-paint="metallic-blue">Metallic Blue</button>
        </section>

        <section>
          <h3>Experience</h3>
          <div class="button-grid">
            <button data-replay-intro>Replay Intro</button>
          </div>
        </section>
      </div>
    </div>

    <canvas id="webgl"></canvas>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
